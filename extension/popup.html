<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>ChromePilot</title>
<style>
/* ── Reset & Base ──────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --border: #e2e5ea;
  --text: #1a1d23;
  --text2: #5f6570;
  --text3: #9099a5;
  --accent: #3b82f6;
  --accent-bg: #eff6ff;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --purple: #a855f7;
  --blue: #3b82f6;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
}
body {
  width: 800px;
  min-height: 600px;
  max-height: 780px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.header-logo {
  width: 22px; height: 22px;
  border-radius: 5px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700;
}
.header-title { font-weight: 600; font-size: 14px; flex: 1; }
.header-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--text2);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red);
  transition: background .3s;
}
.status-dot.on { background: var(--green); }

/* ── Tab Bar ───────────────────────────────────────────── */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  gap: 2px;
  flex-shrink: 0;
}
.tab-btn {
  padding: 8px 14px;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text2);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); background: var(--bg); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-icon { font-size: 14px; }
.tab-badge {
  font-size: 10px;
  background: var(--accent);
  color: #fff;
  padding: 1px 5px;
  border-radius: 8px;
  min-width: 16px;
  text-align: center;
}

/* ── Main Content ──────────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}
.panel { display: none; }
.panel.active { display: block; }

/* ── Cards ─────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.card-count {
  font-size: 11px;
  color: var(--text3);
}

/* ── Feature Pills (Overview) ──────────────────────────── */
.feature-row {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--bg);
  gap: 8px;
}
.feature-row:last-child { border-bottom: none; }
.feature-tab-id {
  font-family: "SF Mono", Monaco, monospace;
  font-size: 11px;
  color: var(--text2);
  min-width: 44px;
}
.feature-tab-title {
  flex: 1;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.feature-pills { display: flex; gap: 4px; }
.pill {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
}
.pill-net { background: #dbeafe; color: #1d4ed8; }
.pill-con { background: #fef3c7; color: #92400e; }
.pill-int { background: #fce7f3; color: #9d174d; }
.pill-prx { background: #d1fae5; color: #065f46; }

/* ── Proxy Rules ───────────────────────────────────────── */
.rule-item {
  display: flex;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--bg);
  gap: 8px;
  cursor: pointer;
  transition: background .15s;
}
.rule-item:hover { background: var(--bg); margin: 0 -6px; padding: 6px 6px; border-radius: 6px; }
.rule-item:last-child { border-bottom: none; }
.rule-action {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  min-width: 52px;
  text-align: center;
  flex-shrink: 0;
}
.action-mock     { background: #d1fae5; color: #065f46; }
.action-block    { background: #fee2e2; color: #991b1b; }
.action-redirect { background: #dbeafe; color: #1d4ed8; }
.action-delay    { background: #fef3c7; color: #92400e; }
.action-header   { background: #f3e8ff; color: #6b21a8; }
.action-resHeader { background: #e0f2fe; color: #0369a1; }
.action-disable  { background: #f1f5f9; color: #64748b; }
.rule-pattern {
  flex: 1;
  font-family: "SF Mono", Monaco, monospace;
  font-size: 11.5px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rule-detail {
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}
.rule-expand-icon {
  font-size: 10px;
  color: var(--text3);
  transition: transform .2s;
  flex-shrink: 0;
}
.rule-expand-icon.open { transform: rotate(90deg); }

/* ── Rule Detail Panel ─────────────────────────────────── */
.rule-detail-panel {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin: 4px 0 8px;
  padding: 10px;
  animation: fadeIn .15s ease;
}
.rule-editor {
  width: 100%;
  min-height: 160px;
  max-height: 360px;
  font-family: "SF Mono", Monaco, monospace;
  font-size: 11px;
  line-height: 1.5;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 8px;
  resize: vertical;
  tab-size: 2;
}
.rule-editor:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
.rule-editor.error { border-color: var(--red); }
.rule-editor-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.rule-editor-hint {
  flex: 1;
  font-size: 10.5px;
  color: var(--text3);
}
.rule-editor-hint.error { color: var(--red); }

/* ── Proxy Log ─────────────────────────────────────────── */
.log-item {
  display: flex;
  align-items: flex-start;
  padding: 5px 0;
  border-bottom: 1px solid var(--bg);
  gap: 6px;
  font-size: 12px;
}
.log-item:last-child { border-bottom: none; }
.log-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.log-body { flex: 1; min-width: 0; }
.log-url {
  font-family: "SF Mono", Monaco, monospace;
  font-size: 11px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.log-meta {
  font-size: 10.5px;
  color: var(--text3);
  margin-top: 1px;
}

/* ── Tab Selector ──────────────────────────────────────── */
.tab-select {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  background: var(--surface);
  color: var(--text);
  margin-bottom: 10px;
  cursor: pointer;
}
.tab-select:focus { outline: none; border-color: var(--accent); }

/* ── Buttons ───────────────────────────────────────────── */
.btn-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.btn {
  padding: 5px 12px;
  font-size: 11.5px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { background: var(--bg); color: var(--text); }
.btn-danger { border-color: #fecaca; color: var(--red); }
.btn-danger:hover { background: #fef2f2; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: #2563eb; }

/* ── Empty State ───────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 24px 16px;
  color: var(--text3);
}
.empty-icon { font-size: 28px; margin-bottom: 6px; }
.empty-text { font-size: 12.5px; line-height: 1.5; }

/* ── Status Bar (bottom) ───────────────────────────────── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
}

/* ── Scrollbar ─────────────────────────────────────────── */
.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
.main::-webkit-scrollbar-thumb:hover { background: #aaa; }

/* ── Toggle Switch ─────────────────────────────────────── */
.toggle {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #cdd3dc;
  border-radius: 20px;
  cursor: pointer;
  transition: background .25s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 2px; top: 2px;
  background: #fff;
  border-radius: 50%;
  transition: transform .25s;
  box-shadow: 0 1px 2px rgba(0,0,0,.15);
}
.toggle input:checked + .toggle-slider { background: var(--green); }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

/* ── Animations ────────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.card { animation: fadeIn .2s ease; }
.log-item-new { animation: fadeIn .3s ease; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">CP</div>
  <div class="header-title">ChromePilot</div>
  <div class="header-status">
    <span id="statusText">Connecting...</span>
    <span class="status-dot" id="statusDot"></span>
  </div>
</div>

<!-- Tab Bar (dynamically populated) -->
<div class="tab-bar" id="tabBar"></div>

<!-- Main Content -->
<div class="main" id="mainContent"></div>

<!-- Status Bar -->
<div class="status-bar">
  <span id="footerLeft">v2.0.0</span>
  <span id="footerRight"></span>
</div>

<script src="popup.js"></script>
</body>
</html>
